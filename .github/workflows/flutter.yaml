name: Flutter CI/CD Pro

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build APK (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [dev, prod]  # Matrix Build (Praktikum 5)
    
    env:
      TELEGRAM_BOT_TOKEN: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
      TELEGRAM_CHAT_ID: "${{ secrets.TELEGRAM_CHAT_ID }}"

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ⚡ Cache Flutter (Sesuai Foto Tutorial Praktikum 5)
      - name: ⚡ Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🧹 Clean Project
        run: flutter clean

      # 🏗️ Build APK sesuai Flavor (Praktikum 5)
      - name: 🏗️ Build APK (${{ matrix.flavor }})
        run: flutter build apk --release --flavor ${{ matrix.flavor }} --split-per-abi

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}
          path: build/app/outputs/flutter-apk/*.apk

      - name: 🚀 Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Notify Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          --data-urlencode "text=✅ Build APK (${{ matrix.flavor }}) Berhasil!"

      - name: 📤 Send APK to Telegram
        if: success()
        run: |
          for apk in build/app/outputs/flutter-apk/*.apk; do
            filename=$(basename "$apk")
            curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document="@$apk" \
            -F caption="📦 APK ${{ matrix.flavor }}: $filename 🚀"
          done